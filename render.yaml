services:
  - type: web
    name: velo-task-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://frontend-five-zeta-89.vercel.app
